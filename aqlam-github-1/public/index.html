<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0D1117" />
    <meta name="description" content="AQLAM — A daily English learning companion for Moroccan STEM students" />
    <title>AQLAM · أقلام</title>
    <style>
      body { margin: 0; background: #0D1117; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run AQLAM.</noscript>
    <div id="root"></div>
    <!-- Netlify Forms detection -->
  <form name="aqlam-eap-test" data-netlify="true" hidden>
    <input name="participant_name"/>
    <input name="participant_email"/>
    <input name="field"/>
    <input name="test_type"/>
    <input name="test_date"/>
    <input name="total_score"/>
    <input name="total_possible"/>
    <input name="percentage"/>
    <input name="reading_score"/>
    <input name="vocabulary_score"/>
    <input name="structure_score"/>
    <input name="pre_calibration"/>
    <input name="post_calibration"/>
    <input name="calibration_gap"/>
    <input name="duration_seconds"/>
    <input name="individual_responses"/>
  </form>
  <form name="aqlam-consent" data-netlify="true" hidden>
    <input name="email"/>
    <input name="name"/>
    <input name="consent_date"/>
    <input name="version"/>
  </form>
</body>
</html>
